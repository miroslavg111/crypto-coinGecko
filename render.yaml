services:
  - type: web
    name: crypto-coingecko
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FLASK_DEBUG
        value: "false"
      - key: COINGECKO_API_KEY
        sync: false